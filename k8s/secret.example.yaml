# Secret = valori SEGRETI (separati dal codice e dall'immagine).
# USO:  copia questo file in  k8s/secret.yaml  (gitignored), mettici i valori veri, poi applicalo.
#   cp k8s/secret.example.yaml k8s/secret.yaml   # poi edita secret.yaml
# stringData accetta testo in chiaro (K8s lo codifica in base64 da solo).
apiVersion: v1
kind: Secret
metadata:
  name: monster-vault-secret
type: Opaque
stringData:
  APP_JWT_SECRET: "INSERISCI_UN_SEGRETO_LUNGO_E_CASUALE"
  APP_ADMIN_PASSWORD: "INSERISCI_PASSWORD_ADMIN"
  CLOUDINARY_API_KEY: "INSERISCI_CLOUDINARY_API_KEY"
  CLOUDINARY_API_SECRET: "INSERISCI_CLOUDINARY_API_SECRET"
  # MongoDB Atlas connection string completa (utente:password inclusi):
  SPRING_DATA_MONGODB_URI: "mongodb+srv://USER:PASSWORD@cluster.xxxxx.mongodb.net/monstervault"
