sonar.projectKey=MarioRanieri_monster-vault-server
sonar.organization=marioranieri

sonar.sources=backend/src/main,frontend/src
sonar.tests=backend/src/test,frontend/tests

sonar.java.binaries=backend/target/classes
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.exclusions=frontend/node_modules/**,backend/src/main/resources/static/**
# File non copribili da unit test: entry point e disegno su canvas (la logica pura
# del crop è in cropRect.ts, testata). I *.test non si misurano.
# Lato backend escludiamo solo infra genuinamente non-unit-testabile: wiring Spring
# (config), adapter esterno Cloudinary, job schedulati, interceptor di rate-limit.
# MongoCanRepository NON è escluso: è unit-testato mockando MongoTemplate.
sonar.coverage.exclusions=frontend/src/main.tsx,frontend/src/PhotoCrop.tsx,frontend/src/setupTests.ts,frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx,backend/src/main/java/com/monstervault/config/**,backend/src/main/java/com/monstervault/service/CloudinaryService.java,backend/src/main/java/com/monstervault/**/*Scheduler.java,backend/src/main/java/com/monstervault/security/LoginRateLimitInterceptor.java
