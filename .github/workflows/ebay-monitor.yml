name: eBay Monitor

# Radar Monster Energy: gira ogni 5 min per drenare in fretta i COMANDI Telegram
# (/add /list /delete). La RICERCA eBay resta ogni ~2h (gated via timestamp su Mongo:
# SWEEP_INTERVAL_SECONDS) per non sforare il limite chiamate. Repo pubblica → minuti
# Actions gratis. I cron GitHub slittano: la finestra lato codice è 3.5h per assorbire.
# Segreti in Settings → Secrets → Actions.
on:
  schedule:
    - cron: '*/5 * * * *'   # ogni 5 minuti (drain comandi; sweep eBay gated a 2h)
  workflow_dispatch:
    inputs:
      send_now:
        description: 'TEST: manda subito gli annunci attuali (ignora i già-visti)'
        type: boolean
        default: false

# Un solo giro alla volta: evita che due run sovrapposti facciano doppio sweep/notifiche.
concurrency:
  group: ebay-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r ebay-monitor/requirements.txt

      - name: Run monitor
        working-directory: ebay-monitor
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MONGODB_URI:        ${{ secrets.MONGODB_URI }}
        run: |
          if [ "${{ inputs.send_now }}" = "true" ]; then
            python ebay_monitor.py --send-now 10
          else
            python ebay_monitor.py
          fi
