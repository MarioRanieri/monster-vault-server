name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests (Java 17 / Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: backend/pom.xml
      - name: Copy frontend into static resources
        run: cp -r frontend/src/* backend/src/main/resources/static/
      - name: Run tests
        run: cd backend && mvn test --no-transfer-progress

  frontend:
    name: Frontend tests (Node / Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/tests/package-lock.json
      - run: cd frontend/tests && npm ci
      - run: cd frontend/tests && npm test
